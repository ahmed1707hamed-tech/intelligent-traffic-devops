server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to backend service
    location /traffic {
        proxy_pass http://backend-service:5000/traffic;
    }

    location /traffic/congestion {
        proxy_pass http://backend-service:5000/traffic/congestion;
    }
}