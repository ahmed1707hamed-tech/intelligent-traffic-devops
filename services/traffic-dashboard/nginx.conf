# Production Nginx Configuration for Static Dashboard
server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    # Serve dashboard
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to backend service in Kubernetes
    location /traffic {
        proxy_pass http://backend-service:5000/traffic;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Optional endpoint
    location /traffic/congestion {
        proxy_pass http://backend-service:5000/traffic/congestion;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}